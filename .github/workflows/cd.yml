name: CD (Publish to npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string

permissions:
  contents: write
  id-token: write # for npm provenance (requires Node 18+ and npm >=9)
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Bump version & decide publish flags
        id: pkg
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUMP: ${{ inputs.bump }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Decide bump command. Protected branches prevent direct pushes back to
          # main, so the release workflow bumps the version in-workflow without a
          # release commit and pushes only the release tag. Repository metadata is
          # then persisted through a follow-up PR branch later in the workflow.
          BUMP_CMD=""
          case "${BUMP:-patch}" in
            major|minor|patch)
              if [ -n "${PREID:-}" ]; then
                # Convert to pre* if preid provided
                case "${BUMP}" in
                  major) BUMP_CMD="npm version premajor --preid ${PREID} --no-git-tag-version" ;;
                  minor) BUMP_CMD="npm version preminor --preid ${PREID} --no-git-tag-version" ;;
                  patch) BUMP_CMD="npm version prepatch --preid ${PREID} --no-git-tag-version" ;;
                esac
              else
                BUMP_CMD="npm version ${BUMP} --no-git-tag-version"
              fi
              ;;
            none)
              # No version bump; use existing version
              BUMP_CMD="echo"
              ;;
            *)
              echo "Unknown bump type: ${BUMP}" >&2
              exit 1
              ;;
          esac

          if [ "${BUMP}" = "none" ]; then
            CURRENT_VER=$(node -p "require('./package.json').version")
            NEW_VER="v${CURRENT_VER}"
          else
            # shellcheck disable=SC2086
            NEW_VER=$(sh -lc "$BUMP_CMD")
          fi

          echo "New version: $NEW_VER"
          if git rev-parse "$NEW_VER" >/dev/null 2>&1; then
            echo "Local tag $NEW_VER already exists."
          else
            git tag -a "$NEW_VER" -m "chore: release $NEW_VER [skip ci]"
          fi
          if git ls-remote --tags origin "refs/tags/$NEW_VER" | grep -q "$NEW_VER"; then
            echo "Remote tag $NEW_VER already exists; reusing it."
          else
            git push origin "$NEW_VER"
          fi

          # Expose tag (vX.Y.Z) and version (X.Y.Z) for later steps
          VER_NO_V=${NEW_VER#v}
          echo "tag=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "version=$VER_NO_V" >> "$GITHUB_OUTPUT"

          NAME=$(node -p "require('./package.json').name")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if npm view "$NAME" version >/dev/null 2>&1; then
            echo "flags=" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--access public" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps (CI)
        run: npm ci

      - name: Test (coverage)
        run: npm run test:coverage

      - name: Install Codecov CLI
        run: python3 -m pip install --upgrade codecov-cli

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          codecovcli --verbose upload-process --disable-search --fail-on-error \
            -n "release-${GITHUB_RUN_ID}" \
            -F unittests \
            -f ./coverage/lcov.info

      - name: Build
        run: npm run build --if-present

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format=cyclonedx --sbom-type=library --omit dev > sbom.cdx.json

      - name: Attest SBOM (GitHub Artifact Attestations)
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom.cdx.json

      - name: Update CHANGELOG.md (move Unreleased to new version)
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          TAG: ${{ steps.pkg.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          verbose: true
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILE="CHANGELOG.md"
          if [ ! -f "$FILE" ]; then
            echo "No CHANGELOG.md found; skipping changelog update."
            exit 0
          fi

          if grep -q "^## \[${VERSION}\]" "$FILE"; then
            echo "CHANGELOG.md already contains a ${VERSION} release section; skipping changelog update."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          VERSION_LINE="## [${VERSION}] - ${DATE}"

          # Identify Unreleased block boundaries
          UNREL_START=$(grep -n '^## \[Unreleased\]' "$FILE" | cut -d: -f1 || true)
          if [ -z "$UNREL_START" ]; then
            echo "No '## [Unreleased]' section found; skipping changelog update."
            exit 0
          fi
          NEXT_HDR=$(awk 'NR>'"$UNREL_START"' && /^## \[/{print NR; exit}' "$FILE")
          if [ -z "$NEXT_HDR" ]; then
            NEXT_HDR=$(wc -l < "$FILE")
            NEXT_HDR=$((NEXT_HDR+1))
          fi

          # Extract sections
          HEADER=$(sed -n "1,${UNREL_START}p" "$FILE")
          UNREL_CONTENT=$(sed -n "$((UNREL_START+1)),$((NEXT_HDR-1))p" "$FILE")
          TAIL=$(sed -n "${NEXT_HDR},\$p" "$FILE")

          # Prepare new Unreleased template (Keep a Changelog style) without tabs/indent issues
          NEW_UNRELEASED=$(printf '%s\n' \
            '' \
            '- **Added**' \
            '  - (placeholder)' \
            '' \
            '- **Changed**' \
            '  - (placeholder)' \
            '' \
            '- **Fixed**' \
            '  - (placeholder)' \
            '' \
            '- **Security**' \
            '  - (placeholder)')

          # Build the new CHANGELOG content
          TMP_FILE=$(mktemp)
          {
            printf "%s\n" "$HEADER"
            printf "%s\n\n" "$NEW_UNRELEASED"
            printf "%s\n" "$VERSION_LINE"
            # If Unreleased was empty, at least add a placeholder so the section isn't blank
            if [ -z "$(echo "$UNREL_CONTENT" | tr -d '\n' | tr -d '[:space:]')" ]; then
              printf "### Changed\n- (no notable changes)\n\n"
            else
              printf "%s\n" "$UNREL_CONTENT"
              # Ensure a trailing newline after the inserted section
              printf "\n"
            fi
            printf "%s\n" "$TAIL"
          } > "$TMP_FILE"

          mv "$TMP_FILE" "$FILE"

          # Update bottom compare links
          # Update [Unreleased] compare to start at v${VERSION}
          COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/v${VERSION}...HEAD"
          awk -v repl="[Unreleased]: ${COMPARE_URL}" 'BEGIN{OFS=FS} { if ($0 ~ /^\[Unreleased\]: /) { print repl } else { print } }' "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"

          # Append a link for the new version if not present
          if ! grep -q "^\[${VERSION}\]:" "$FILE"; then
            echo "[${VERSION}]: https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}" >> "$FILE"
          fi

          RELEASE_BRANCH="release-metadata/v${VERSION}"
          git checkout -B "$RELEASE_BRANCH"
          git add package.json package-lock.json "$FILE"
          if git diff --cached --quiet; then
            echo "No release metadata changes to persist."
            exit 0
          fi

          git commit -m "chore(release): persist v${VERSION} metadata"
          git push -u origin "$RELEASE_BRANCH" --force-with-lease

          if [ -n "$(gh pr list --head "$RELEASE_BRANCH" --json number --jq '.[0].number // empty')" ]; then
            echo "Release metadata PR for $RELEASE_BRANCH already exists."
          else
            PR_BODY=$(printf '%s\n' \
              '## Summary' \
              "- persist package metadata for released version \`v${VERSION}\`" \
              '- promote the Unreleased changelog entries into the release section generated by CD' \
              '' \
              '## Notes' \
              '- created automatically by the CD publish workflow to respect protected \`main\` branch rules')
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): persist v${VERSION} metadata" \
              --body "$PR_BODY"
          fi

      - name: Create GitHub Release draft (immutable-safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $TAG already exists and is published. Immutable releases cannot be modified after publication; cut a new version instead."
              exit 1
            fi

            echo "Draft release $TAG already exists; refreshing mutable assets."
            if [ -f sbom.cdx.json ]; then
              gh release upload "$TAG" sbom.cdx.json --clobber
            else
              echo "No SBOM generated; leaving existing draft assets unchanged."
            fi
          else
            if [ -f sbom.cdx.json ]; then
              gh release create "$TAG" sbom.cdx.json                 --title "Release $TAG"                 --generate-notes                 --verify-tag                 --draft
            else
              gh release create "$TAG"                 --title "Release $TAG"                 --generate-notes                 --verify-tag                 --draft
            fi
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish ${{ steps.pkg.outputs.flags }} --provenance

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Expected draft release $TAG to exist before publication."
            exit 1
          fi

          IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG" --draft=false --latest
          else
            echo "Release $TAG is already published; skipping publication."
          fi
